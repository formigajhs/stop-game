<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stop Game</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #0b0b12;
      --bg2: #141422;
      --card: rgba(255, 255, 255, 0.06);
      --card-2: rgba(255, 255, 255, 0.09);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f5f5f7;
      --muted: #b8b8c7;
      --red: #ff3d5a;
      --red-2: #ff6a7f;
      --pink: #ff4fd8;
      --purple: #7f5cff;
      --yellow: #ffd95c;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 79, 216, 0.15), transparent 28%),
        radial-gradient(circle at top right, rgba(127, 92, 255, 0.18), transparent 30%),
        linear-gradient(135deg, #08080d 0%, #11111b 50%, #0a0a11 100%);
      min-height: 100vh;
      padding: 18px;
    }

    .container { max-width: 1500px; margin: 0 auto; }

    .header { text-align: center; margin-bottom: 16px; }

    h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: 1px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--red), var(--pink), var(--purple), var(--yellow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 18px rgba(255, 61, 90, 0.15);
    }

    .sub { margin-top: 6px; color: var(--muted); font-size: 14px; }

    button {
      border: none;
      cursor: pointer;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--red), var(--pink));
      box-shadow: 0 6px 16px rgba(255, 61, 90, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      min-height: 42px;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(255, 61, 90, 0.36);
      opacity: 0.96;
    }

    .painel-sala {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px auto 12px;
    }

    .painel-sala input {
      width: 150px;
      height: 42px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      outline: none;
      background: rgba(255,255,255,0.94);
      color: #111;
      font-size: 13px;
      font-weight: 700;
    }

    .painel-sala input:focus {
      box-shadow: 0 0 0 4px rgba(255, 79, 216, 0.16);
      border-color: rgba(255, 79, 216, 0.55);
    }

    .letra-box {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,0.045);
      border: 1px solid var(--line);
    }

    #letraAtual {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 217, 92, 0.12);
      border: 1px solid rgba(255, 217, 92, 0.35);
      color: var(--yellow);
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    #statusSala {
      text-align: center;
      min-height: 22px;
      margin-bottom: 12px;
      color: var(--yellow);
      font-weight: 800;
      font-size: 14px;
    }

    .tabela-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.03));
      backdrop-filter: blur(10px);
      border-radius: 22px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    table {
      width: 100%;
      min-width: 1180px;
      border-collapse: separate;
      border-spacing: 6px;
    }

    th {
      background: linear-gradient(135deg, rgba(255, 61, 90, 0.18), rgba(127, 92, 255, 0.15));
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      padding: 10px 7px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.15;
      text-align: center;
      min-width: 92px;
    }

    td { text-align: center; vertical-align: middle; }

    .campo-box {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      transition: 0.2s ease;
    }

    .campo-box:hover {
      background: var(--card-2);
      border-color: rgba(255,255,255,0.18);
    }

    .resposta {
      width: 100%;
      min-width: 86px;
      border: 1px solid transparent;
      outline: none;
      padding: 9px 8px;
      border-radius: 10px;
      background: #191926;
      color: white;
      text-align: center;
      font-size: 12px;
      transition: 0.2s ease;
    }

    .resposta:focus {
      border-color: var(--pink);
      background: #202031;
      box-shadow: 0 0 0 4px rgba(255, 79, 216, 0.12);
    }

    .resposta:disabled {
      opacity: 0.58;
      cursor: not-allowed;
    }

    .linha-pontos .campo-box { background: rgba(255,255,255,0.04); }

    .label-pontos {
      font-size: 11px;
      color: #d7d7e3;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .ponto {
      width: 62px;
      border: 1px solid transparent;
      outline: none;
      padding: 8px 6px;
      border-radius: 10px;
      background: #1f1f2d;
      color: white;
      text-align: center;
      font-size: 12px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .ponto:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 4px rgba(255, 217, 92, 0.12);
    }

    .col-total { min-width: 105px; }

    .total-area {
      background: linear-gradient(135deg, var(--red), var(--purple));
      border-radius: 16px;
      padding: 11px 8px;
      color: white;
      box-shadow: 0 10px 24px rgba(127, 92, 255, 0.22);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .total-label {
      display: block;
      font-size: 10px;
      opacity: 0.95;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .total-box {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .rodada-separador td {
      padding: 2px 0;
      border: none;
      background: transparent;
      height: 6px;
    }

    @media (max-width: 900px) {
      body { padding: 12px; }
      h1 { font-size: 30px; }
      .sub { font-size: 13px; }
      .painel-sala { align-items: stretch; }
      .painel-sala input, .painel-sala button { width: 100%; max-width: 320px; }
      .letra-box { width: 100%; justify-content: center; }
      table { min-width: 1040px; }
      th { font-size: 11px; min-width: 82px; }
      .resposta { min-width: 78px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>STOP GAME</h1>
      <div class="sub">Preencha rápido, marque os pontos embaixo e veja a soma automática da rodada</div>
    </div>

    <div class="painel-sala">
      <div class="letra-box">
        <button onclick="sortearLetra()">Sortear letra</button>
        <div id="letraAtual">?</div>
      </div>

      <input id="nomeJogador" placeholder="Seu nome">
      <input id="codigoSala" placeholder="Código da sala">

      <button onclick="criarSala()">Criar sala</button>
      <button onclick="entrarSala()">Entrar sala</button>
      <button onclick="pararJogo()">STOP</button>
      <button onclick="adicionarRodada()">+ Rodada</button>
    </div>

    <div id="statusSala"></div>

    <div class="tabela-wrap">
      <table id="tabelaStop">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Animal</th>
            <th>Cor</th>
            <th>Fruta</th>
            <th>Objeto</th>
            <th>Carro</th>
            <th>Profissão</th>
            <th>Minha sogra é</th>
            <th>Meu marido é</th>
            <th>CEP</th>
            <th>Filme / Série / Novela</th>
            <th>Comida</th>
            <th class="col-total">Total</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getDatabase,
      ref,
      set,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyACVSvwXs8o0yZNYjEEviJryIJ7Op0qiFU",
      authDomain: "stop-df548.firebaseapp.com",
      databaseURL: "https://stop-df548-default-rtdb.firebaseio.com",
      projectId: "stop-df548",
      storageBucket: "stop-df548.firebasestorage.app",
      messagingSenderId: "937139384632",
      appId: "1:937139384632:web:2bfc0bcc511d5afa9811cd",
      measurementId: "G-36570Z5JS1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    console.log("Firebase conectado!");

    const categorias = 12;
    let salaAtual = "";
    let stopAlertadoMomento = null;

    window.criarSala = function criarSala() {
      const nome = document.querySelector("#nomeJogador").value.trim() || "Jogador";

      salaAtual = Math.random().toString(36).substring(2, 8).toUpperCase();

      document.querySelector("#codigoSala").value = salaAtual;
      document.querySelector("#statusSala").textContent = "Sala criada: " + salaAtual;
      document.querySelector("#letraAtual").textContent = "?";
      stopAlertadoMomento = null;

      set(ref(db, "salas/" + salaAtual), {
        stop: {
          ativo: false,
          jogador: "",
          momento: null
        },
        letra: "",
        jogadores: {
          [nome]: true
        }
      });

      liberarCampos();
      ouvirSala();
      ouvirLetra();
    };

    window.entrarSala = function entrarSala() {
      const nome = document.querySelector("#nomeJogador").value.trim() || "Jogador";

      salaAtual = document.querySelector("#codigoSala").value.trim().toUpperCase();

      if (!salaAtual) {
        alert("Digite o código da sala.");
        return;
      }

      set(ref(db, "salas/" + salaAtual + "/jogadores/" + nome), true);

      document.querySelector("#statusSala").textContent = "Você entrou na sala: " + salaAtual;

      ouvirSala();
      ouvirLetra();
    };

    window.pararJogo = function pararJogo() {
      if (!salaAtual) {
        alert("Crie ou entre em uma sala primeiro.");
        return;
      }

      const nome = document.querySelector("#nomeJogador").value.trim() || "Jogador";

      set(ref(db, "salas/" + salaAtual + "/stop"), {
        ativo: true,
        jogador: nome,
        momento: Date.now()
      });
    };

    function ouvirSala() {
      onValue(ref(db, "salas/" + salaAtual + "/stop"), function(snapshot) {
        const stop = snapshot.val();

        if (stop && stop.ativo === true) {
          document.querySelector("#statusSala").textContent =
            "STOP! " + stop.jogador + " terminou primeiro. Agora contem os pontos.";

          document.querySelectorAll(".resposta").forEach(function(input) {
            input.disabled = true;
          });

          if (stop.momento && stopAlertadoMomento !== stop.momento) {
            stopAlertadoMomento = stop.momento;
            alert("STOP! " + stop.jogador + " terminou primeiro.");
          }
        } else {
          liberarCampos();
        }
      });
    }

    function liberarCampos() {
      document.querySelectorAll(".resposta").forEach(function(input) {
        input.disabled = false;
      });
    }

    window.adicionarRodada = function adicionarRodada() {
      const tbody = document.querySelector("#tabelaStop tbody");

      if (salaAtual) {
        set(ref(db, "salas/" + salaAtual + "/stop"), {
          ativo: false,
          jogador: "",
          momento: null
        });
        stopAlertadoMomento = null;
      }

      const linhaRespostas = document.createElement("tr");
      linhaRespostas.className = "linha-respostas";

      let htmlRespostas = "";

      for (let i = 0; i < categorias; i++) {
        htmlRespostas += `
          <td>
            <div class="campo-box">
              <input type="text" class="resposta" placeholder="Digite" />
            </div>
          </td>
        `;
      }

      htmlRespostas += `
        <td class="col-total" rowspan="2">
          <div class="total-area">
            <span class="total-label">Total</span>
            <div class="total-box">0</div>
          </div>
        </td>
      `;

      linhaRespostas.innerHTML = htmlRespostas;

      const linhaPontos = document.createElement("tr");
      linhaPontos.className = "linha-pontos";

      let htmlPontos = "";

      for (let i = 0; i < categorias; i++) {
        htmlPontos += `
          <td>
            <div class="campo-box">
              <div class="label-pontos">Pontos</div>
              <input type="number" class="ponto" min="0" placeholder="0" oninput="calcularTotal(this)" />
            </div>
          </td>
        `;
      }

      linhaPontos.innerHTML = htmlPontos;

      const separador = document.createElement("tr");
      separador.className = "rodada-separador";
      separador.innerHTML = `<td colspan="13"></td>`;

      tbody.appendChild(linhaRespostas);
      tbody.appendChild(linhaPontos);
      tbody.appendChild(separador);
    };

    window.calcularTotal = function calcularTotal(input) {
      const linhaPontos = input.closest("tr");
      const linhaRespostas = linhaPontos.previousElementSibling;
      const pontos = linhaPontos.querySelectorAll(".ponto");

      let soma = 0;

      pontos.forEach(function(campo) {
        soma += Number(campo.value) || 0;
      });

      linhaRespostas.querySelector(".total-box").textContent = soma;
    };

    window.sortearLetra = function sortearLetra() {
      if (!salaAtual) {
        alert("Crie ou entre em uma sala primeiro.");
        return;
      }

      const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      const letra = letras[Math.floor(Math.random() * letras.length)];

      set(ref(db, "salas/" + salaAtual + "/letra"), letra);
    };

    function ouvirLetra() {
      onValue(ref(db, "salas/" + salaAtual + "/letra"), function(snapshot) {
        const letra = snapshot.val();

        if (letra) {
          document.querySelector("#letraAtual").textContent = letra;
        }
      });
    }

    adicionarRodada();
  </script>
</body>
</html>
